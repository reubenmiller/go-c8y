name: tests

on:
  push:
    branches: [ main ]
    paths-ignore:
      - docs/*
      - '**/*.md'
      - test/*.go

  pull_request:
    branches: [ main ]

jobs:

  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          # skip caching due to golangci-lint errors during setup
          # see https://github.com/golangci/golangci-lint-action/issues/807
          cache: false
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  # API drift gate: compares the vendored OpenAPI spec against the hand-written SDK and
  # fails on any drift NOT declared under `drift:` in docs/c8y-oas.overlay.yml (Phase 4 of
  # docs/API_GEN.md). Also verifies the generated Layer-0 substrate is committed and current.
  api-drift:
    name: api-drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Check API drift (gating)
        run: task lint-api -- --strict
      - name: Verify generated code is up to date
        run: |
          task generate
          git diff --exit-code -- 'pkg/c8y/api/spec/*.go' '**/zz_generated_*.go' \
            || (echo "::error::Generated code is stale. Run 'task generate' and commit." && exit 1)

  # Offline gate: runs on every push/PR (including forks) without a live tenant.
  test-offline:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'
    - name: Install Task
      uses: arduino/setup-task@v2
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Run offline tests
      run: task test-ci

  # Live tests against a real tenant. Only runs when credentials are available
  # (i.e. not on forked-PR builds), so external contributors are not blocked.
  test:
    runs-on: ${{ matrix.os }}
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    env:
      C8Y_HOST: ${{ secrets.C8Y_HOST }}
      C8Y_TENANT: ${{ secrets.C8Y_TENANT }}
      C8Y_USER: ${{ secrets.C8Y_USER }}
      C8Y_PASSWORD: ${{ secrets.C8Y_PASSWORD }}

      # Max timeout for each request (in milliseconds)
      C8Y_TIMEOUT: 30000

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'
    - name: Install Task
      uses: arduino/setup-task@v2
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Run tests
      run: task test
