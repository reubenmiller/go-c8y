version: '3'

env:
  ENV: testing

dotenv: ['.env', 'c8y.env', '{{.ENV}}/c8y.env', '{{.HOME}}/c8y.env']

tasks:
  test:
    desc: Test all packages
    cmds:
      - task: test-c8y
      - task: test-microservice
      - task: test-race

  test-offline:
    desc: Run integration tests against the fake server (no Cumulocity needed)
    env:
      TEST_MODE: offline
    cmds:
      - go test -v -timeout 5m ./test/c8y_api_test/...

  test-unit:
    desc: Run the standalone package unit tests (no Cumulocity needed)
    cmds:
      - go test -timeout 5m ./pkg/...

  test-ci:
    desc: Offline gate run in CI - unit tests plus the offline integration suite with coverage
    env:
      TEST_MODE: offline
    cmds:
      - go test -timeout 5m ./pkg/...
      - go test -timeout 5m -coverpkg=./pkg/c8y/api/... -coverprofile=coverage.out ./test/c8y_api_test/...
      - go tool cover -func=coverage.out | tail -n 1

  test-live:
    desc: Run integration tests against a real Cumulocity server
    env:
      TEST_MODE: live
    cmds:
      - go test -v -timeout 30m ./test/c8y_api_test/...

  test-record:
    desc: Run integration tests against a live server and record golden files
    env:
      TEST_MODE: record
    cmds:
      - go test -v -timeout 30m ./test/c8y_api_test/...

  test-golden:
    desc: Validate fake server responses against recorded golden files
    env:
      TEST_MODE: offline
    cmds:
      - go test -v -timeout 5m -run TestFakeServer_MatchesGolden ./test/c8y_api_test/...

  test-c8y:
    desc: Test c8y package
    cmds:
      - go test -v -timeout 30m github.com/reubenmiller/go-c8y/v2/test/c8y_test

  test-microservice:
    desc: Test microservice package
    cmds:
      - go test -v -timeout 30m github.com/reubenmiller/go-c8y/v2/test/microservice_test

  test-race:
    desc: Test for race conditions
    cmds:
      - go test -race -timeout 30s github.com/reubenmiller/go-c8y/v2/test/c8y_test -run "^(TestRealtimeSubscriptions_Unsubscribe)$"

  generate:
    desc: Generate the Layer-0 SDK substrate (paths, enums, per-resource options/models) from the OpenAPI spec
    cmds:
      - go run ./tools/c8ygen generate {{.CLI_ARGS}}
      - go run ./tools/c8ygen resources {{.CLI_ARGS}}

  lint-api:
    desc: Report drift between the OpenAPI spec and the hand-written SDK
    cmds:
      - go run ./tools/c8ygen lint {{.CLI_ARGS}}

  fetch-spec:
    desc: Download the latest Cumulocity OpenAPI spec into docs/c8y-oas.yml
    cmds:
      - go run ./tools/c8ygen fetch {{.CLI_ARGS}}

  lint:
    desc: Linting
    cmds:
      - curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin
      - golangci-lint run -c .golangci.yml

  docs:
    desc: Launch go doc webserver
    cmds:
      - go run golang.org/x/pkgsite/cmd/pkgsite@latest -open

  spell-checker:
    desc: Run the spell checker
    cmds:
      - docker run -v $PWD:/workdir ghcr.io/streetsidesoftware/cspell:latest "**"
