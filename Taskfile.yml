version: '3'

env:
  ENV: testing

dotenv: ['.env', 'c8y.env', '{{.ENV}}/c8y.env', '{{.HOME}}/c8y.env']

tasks:
  test:
    desc: Test all packages
    cmds:
      - task: test-c8y
      - task: test-microservice
      - task: test-race

  test-offline:
    desc: Run integration tests against the fake server (no Cumulocity needed)
    env:
      TEST_MODE: offline
    cmds:
      - go test -v -timeout 5m ./test/c8y_api_test/...

  test-live:
    desc: Run integration tests against a real Cumulocity server
    env:
      TEST_MODE: live
    cmds:
      - go test -v -timeout 30m ./test/c8y_api_test/...

  test-record:
    desc: Run integration tests against a live server and record golden files
    env:
      TEST_MODE: record
    cmds:
      - go test -v -timeout 30m ./test/c8y_api_test/...

  test-golden:
    desc: Validate fake server responses against recorded golden files
    env:
      TEST_MODE: offline
    cmds:
      - go test -v -timeout 5m -run TestFakeServer_MatchesGolden ./test/c8y_api_test/...

  test-c8y:
    desc: Test c8y package
    cmds:
      - go test -v -timeout 30m github.com/reubenmiller/go-c8y/test/c8y_test

  test-microservice:
    desc: Test microservice package
    cmds:
      - go test -v -timeout 30m github.com/reubenmiller/go-c8y/test/microservice_test

  test-race:
    desc: Test for race conditions
    cmds:
      - go test -race -timeout 30s github.com/reubenmiller/go-c8y/test/c8y_test -run "^(TestRealtimeSubscriptions_Unsubscribe)$"

  lint:
    desc: Linting
    cmds:
      - curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin
      - golangci-lint run -c .golangci.yml

  docs:
    desc: Launch go doc webserver
    cmds:
      - go run golang.org/x/pkgsite/cmd/pkgsite@latest -open

  spell-checker:
    desc: Run the spell checker
    cmds:
      - docker run -v $PWD:/workdir ghcr.io/streetsidesoftware/cspell:latest "**"
