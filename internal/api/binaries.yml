
---

#
# binaries
# https://cumulocity.com/guides/reference/binaries/
#
- name: getBinaryCollection
  description: 'Get collection of inventory binaries'
  method: GET
  path: /inventory/binaries
  accept: application/vnd.com.nsn.cumulocity.applicationCollection+json
  alias:
      go: getBinaryCollection
      powershell: Get-BinaryCollection

- name: downloadBinary
  description: 'Get binary'
  method: PUT
  path: /inventory/binaries/{id}
  alias:
      go: downloadBinary
      powershell: Download-Binary
  pathParameters:
    - name: id
      type: string
      required: true
      description: Inventory binary id
  options:
    # TODO: Handle new options
    - name: outputDir
      type: directory
      required: true
      description: Output directory where the binary should be saved to

- name: newBinary
  description: 'New inventory binary'
  method: POST
  path: /inventory/binaries
  accept: application/vnd.com.nsn.cumulocity.managedObject+json
  alias:
      go: createBinary
      powershell: New-Binary

  body:
    - name: file
      type: file
      required: true
      description: File to be uploaded as a binary

- name: updateBinary
  description: 'Update inventory binary'
  method: PUT
  path: /inventory/binaries/{id}
  accept: 'application/json'
  alias:
      go: updateBinary
      powershell: Update-Binary
  pathParameters:
    - name: id
      type: string
      required: true
      description: Inventory binary id

  body:
    - name: file
      type: file
      required: true
      description: File to be uploaded as a binary

- name: deleteBinary
  description: 'Delete event binary'
  method: DELETE
  path: /inventory/binaries/{id}
  alias:
      go: deleteBinary
      powershell: Remove-Binary
  pathParameters:
    - name: id
      type: string
      required: true
      description: Inventory binary id
