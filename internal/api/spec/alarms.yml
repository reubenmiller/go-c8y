
---
information:
  name: alarms
  description: Cumulocity alarms
  descriptionLong: 'REST endpoint to interact with Cumulocity alarms'
  link: https://cumulocity.com/guides/reference/alarms/

endpoints:
  - name: getAlarmCollection
    method: GET
    description: Get a collection of alarms based on filter parameters
    descriptionLong: Get a collection of alarms based on filter parameters
    examples:
      powershell:
        -
          Get-AlarmCollection

      go:
        -
          c8y alarms list --type value --severity MAJOR

    path: alarm/alarms
    accept: application/vnd.com.nsn.cumulocity.alarmCollection+json
    collectionType: application/vnd.com.nsn.cumulocity.alarm+json
    listProperty: alarms
    alias:
        go: list
        powershell: Get-AlarmCollection
    queryParameters:
      - name: device
        type: '[]device'
        property: source
        description: Source device id.

      - name: dateFrom
        type: datetime
        description: Start date or date and time of alarm occurrence.

      - name: dateTo
        type: datetime
        description: End date or date and time of alarm occurrence.

      - name: type
        type: string
        description: Alarm type.

      - name: fragmentType
        type: string
        description: Alarm fragment type.

      - name: status
        type: string
        description: Comma separated alarm statuses, for example ACTIVE,CLEARED.
        validationSet: [ACTIVE, ACKNOWLEDGED, CLEARED]

      - name: severity
        type: string
        description: Alarm severity, for example CRITICAL, MAJOR, MINOR or WARNING.
        validationSet: [CRITICAL, MAJOR, MINOR, WARNING]

      - name: resolved
        type: boolean
        description: When set to true only resolved alarms will be removed (the one with status CLEARED), false means alarms with status ACTIVE or ACKNOWLEDGED.

      - name: withAssets
        type: boolean
        description: Include assets

      - name: withDevices
        type: boolean
        description: Include devices

  - name: newAlarm
    method: POST
    path: alarm/alarms
    accept: application/vnd.com.nsn.cumulocity.alarm+json
    description: 'Create a new alarm'
    descriptionLong: 'Create a new alarm'
    alias:
        go: new
        powershell: New-Alarm
    body:
      - name: device
        type: '[]device'
        required: true
        property: source.id
        description: The ManagedObject that the alarm originated from

      - name: type
        type: string
        required: true
        description: Identifies the type of this alarm, e.g. 'com_cumulocity_events_TamperEvent'.

      - name: time
        type: datetime
        required: true
        description: Time of the alarm.

      - name: text
        type: string
        required: true
        description: Text description of the alarm.

      - name: severity
        type: string
        required: true
        description: 'The severity of the alarm: CRITICAL, MAJOR, MINOR or WARNING. Must be upper-case.'
        validationSet: [CRITICAL, MAJOR, MINOR, WARNING]

      - name: status
        type: string
        description: 'The status of the alarm: ACTIVE, ACKNOWLEDGED or CLEARED. If status was not appeared, new alarm will have status ACTIVE. Must be upper-case.'
        validationSet: [ACTIVE, ACKNOWLEDGED, CLEARED]

      - name: data
        type: json
        description: Additional properties of the alarm.

  - name: updateAlarmCollection
    method: PUT
    path: alarm/alarms
    description: Update a collection of alarms. Currently only the status of alarms can be changed
    accept: application/vnd.com.nsn.cumulocity.alarmCollection+json
    collectionType: application/vnd.com.nsn.cumulocity.alarm+json
    listProperty: alarms
    alias:
        go: updateCollection
        powershell: Update-AlarmCollection
    body:
      - name: newStatus
        type: string
        description: New status to be applied to all of the matching alarms
        required: true
        property: status
        validationSet: [ACTIVE, ACKNOWLEDGED, CLEARED]

    queryParameters:
      - name: device
        type: '[]device'
        property: source
        description: The ManagedObject that the alarm originated from

      - name: status
        type: string
        description: 'The status of the alarm: ACTIVE, ACKNOWLEDGED or CLEARED. If status was not appeared, new alarm will have status ACTIVE. Must be upper-case.'
        validationSet: [ACTIVE, ACKNOWLEDGED, CLEARED]

      - name: severity
        type: string
        description: 'The severity of the alarm: CRITICAL, MAJOR, MINOR or WARNING. Must be upper-case.'
        validationSet: [CRITICAL, MAJOR, MINOR, WARNING]

      - name: resolved
        type: boolean
        description: 'When set to true only resolved alarms will be removed (the one with status CLEARED), false means alarms with status ACTIVE or ACKNOWLEDGED.'

      - name: dateFrom
        type: datetime
        description: Start date or date and time of alarm occurrence.

      - name: dateTo
        type: datetime
        description: End date or date and time of alarm occurrence.

  - name: getAlarm
    description: 'Get alarm/s'
    method: GET
    path: alarm/alarms/{id}
    accept: application/vnd.com.nsn.cumulocity.alarm+json
    alias:
        go: get
        powershell: Get-Alarm
    pathParameters:
      - name: id
        type: string
        required: true
        description: Alarm id

  - name: updateAlarm
    method: PUT
    path: alarm/alarms/{id}
    accept: application/vnd.com.nsn.cumulocity.alarm+json
    description: Update alarm
    alias:
        go: update
        powershell: Update-Alarm
    body:
      - name: status
        type: string
        required: false
        description: Comma separated alarm statuses, for example ACTIVE,CLEARED.
        validationSet: [ACTIVE, ACKNOWLEDGED, CLEARED]

      - name: severity
        type: string
        required: false
        description: Alarm severity, for example CRITICAL, MAJOR, MINOR or WARNING.
        validationSet: [CRITICAL, MAJOR, MINOR, WARNING]

      - name: text
        type: string
        required: false
        description: Text description of the alarm.
        validationSet: [CRITICAL, MAJOR, MINOR, WARNING]

      - name: data
        type: json
        description: Additional properties of the alarm.

    pathParameters:
      - name: id
        type: string
        description: Alarm id
        required: true

  - name: deleteAlarm
    description: 'Delete alarm/s'
    method: DELETE
    path: alarm/alarms/{id}
    accept: ''
    alias:
        go: delete
        powershell: Remove-Alarm
    pathParameters:
      - name: id
        type: string
        required: true
        description: Alarm id

  - name: deleteAlarmCollection
    description: 'Delete a collection of alarms'
    method: DELETE
    path: alarm/alarms
    accept: ''
    alias:
        go: deleteCollection
        powershell: Remove-AlarmCollection
    queryParameters:
      - name: device
        type: '[]device'
        property: source
        description: 'Source device id.'

      - name: dateFrom
        type: datetime
        description: 'Start date or date and time of alarm occurrence.'

      - name: dateTo
        type: datetime
        description: 'End date or date and time of alarm occurrence.'

      - name: type
        type: string
        description: 'Alarm type.'

      - name: fragmentType
        type: string
        description: Alarm fragment type.

      - name: status
        type: strings
        description: 'Comma separated alarm statuses, for example ACTIVE,CLEARED.'
        validationSet: [ACTIVE, ACKNOWLEDGED, CLEARED]

      - name: severity
        type: string
        description: Alarm severity, for example CRITICAL, MAJOR, MINOR or WARNING.
        validationSet: [CRITICAL, MAJOR, MINOR, WARNING]

      - name: resolved
        type: boolean
        description: 'When set to true only resolved alarms will be removed (the one with status CLEARED), false means alarms with status ACTIVE or ACKNOWLEDGED.'

      - name: withSourceAssets
        type: boolean
        description: 'When set to true also alarms for related source assets will be removed. When this parameter is provided also source must be defined.'

      - name: withSourceDevices
        type: boolean
        description: 'When set to true also alarms for related source devices will be removed. When this parameter is provided also source must be defined.'

