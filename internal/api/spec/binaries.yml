
---

information:
  name: binaries
  description: Cumulocity binaries
  descriptionLong: 'REST endpoint to interact with Cumulocity binaries'
  link: https://cumulocity.com/guides/reference/binaries/

endpoints:
  - name: getBinaryCollection
    description: 'Get collection of inventory binaries'
    method: GET
    path: /inventory/binaries
    accept: application/vnd.com.nsn.cumulocity.managedObjectCollection+json
    collectionType: application/vnd.com.nsn.cumulocity.managedObject+json
    listProperty: managedObjects
    alias:
        go: list
        powershell: Get-BinaryCollection

  - name: download
    description: 'Get binary'
    method: Get
    path: /inventory/binaries/{id}
    alias:
        go: download
        powershell: Save-Binary
    pathParameters:
      - name: id
        type: string
        required: true
        description: Inventory binary id
    options:
      # TODO: Handle new options
      - name: outputDir
        type: directory
        required: true
        description: Output directory where the binary should be saved to

  - name: newBinary
    description: 'New inventory binary'
    method: POST
    path: /inventory/binaries
    accept: application/vnd.com.nsn.cumulocity.managedObject+json
    alias:
        go: create
        powershell: New-Binary

    body:
      - name: file
        type: file
        required: true
        description: File to be uploaded as a binary

  - name: updateBinary
    description: 'Update inventory binary'
    method: PUT
    path: /inventory/binaries/{id}
    accept: application/vnd.com.nsn.cumulocity.managedObject+json
    alias:
        go: update
        powershell: Update-Binary
    pathParameters:
      - name: id
        type: string
        required: true
        description: Inventory binary id

    body:
      - name: file
        type: file
        required: true
        description: File to be uploaded as a binary

  - name: deleteBinary
    description: 'Delete event binary'
    method: DELETE
    path: /inventory/binaries/{id}
    alias:
        go: deleteBinary
        powershell: Remove-Binary
    pathParameters:
      - name: id
        type: string
        required: true
        description: Inventory binary id
