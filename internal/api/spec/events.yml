
---
information:
  name: events
  description: Cumulocity events
  descriptionLong: 'REST endpoint to interact with Cumulocity events'
  link: https://cumulocity.com/guides/reference/events/

endpoints:
  - name: getEventCollection
    method: GET
    description: Get a collection of events based on filter parameters
    descriptionLong: Get a collection of events based on filter parameters
    examples:
      powershell:
        - Get a list of events
          Get-EventCollection

      go:
        - Get a list of events
          c8y event get

    path: event/events
    accept: 'application/json'
    alias:
        go: list
        powershell: Get-EventCollection

    queryParameters:
      - name: device
        type: '[]device'
        property: source
        description: Device ID

      - name: type
        type: string
        description: Event type.

      - name: fragmentType
        type: string
        description: Fragment name from event.

      - name: dateFrom
        type: datetime
        description: Start date or date and time of event occurrence.

      - name: dateTo
        type: datetime
        description: End date or date and time of event occurrence.

      - name: revert
        type: boolean
        description: Return the newest instead of the oldest events. Must be used with dateFrom and dateTo parameters

  - name: deleteEventCollection
    description: 'Delete a collection of events'
    method: DELETE
    path: event/events
    accept: 'application/json'
    alias:
        go: deleteCollection
        powershell: Remove-EventCollection
    queryParameters:
      - name: device
        type: '[]device'
        property: source
        description: Device ID

      - name: type
        type: string
        description: Event type.

      - name: fragmentType
        type: string
        description: Fragment name from event.

      - name: dateFrom
        type: datetime
        description: Start date or date and time of event occurrence.

      - name: dateTo
        type: datetime
        description: End date or date and time of event occurrence.

      - name: revert
        type: boolean
        description: Return the newest instead of the oldest events. Must be used with dateFrom and dateTo parameters


  - name: getEvent
    description: 'Get event/s'
    method: GET
    path: event/events/{id}
    accept: 'application/json'
    alias:
        go: get
        powershell: Get-Event
    pathParameters:
      - name: id
        type: string
        required: true
        description: Event id

  - name: newEvent
    method: POST
    path: event/events
    accept: 'application/json'
    description: Create event
    descriptionLong: Create event
    alias:
        go: new
        powershell: New-Event
    body:
      - name: device
        type: '[]device'
        required: true
        property: source.id
        description: The ManagedObject which is the source of this event.

      - name: time
        type: string
        required: true
        description: Time of the event.

      - name: type
        type: string
        required: true
        description: Identifies the type of this event.

      - name: text
        type: string
        required: true
        description: Text description of the event.

      - name: data
        type: json
        description: Additional properties of the event.

  - name: updateEvent
    method: PUT
    path: event/events/{id}
    accept: 'application/json'
    description: 'Update an event'
    descriptionLong: 'Update an event'
    alias:
        go: update
        powershell: Update-Event
    pathParameters:
      - name: id
        type: string
        required: true
        description: Event id
    body:
      - name: text
        type: string
        required: true
        description: Text description of the event.

      - name: data
        type: json
        description: Additional properties of the event.

  - name: deleteEvent
    description: 'Delete event/s'
    method: DELETE
    path: event/events/{id}
    accept: 'application/json'
    alias:
        go: delete
        powershell: Remove-Event
    pathParameters:
      - name: id
        type: string
        required: true
        description: Event id

  #
  # binaries
  #
  - name: getEventBinary
    description: 'Get event binary'
    method: GET
    path: event/events/{id}/binaries
    accept: 'application/json'
    alias:
        go: downloadBinary
        powershell: Get-EventBinary
    pathParameters:
      - name: id
        type: string
        required: true
        description: Event id
    options:
      # TODO: Handle new options
      - name: outputDir
        type: directory
        required: true
        description: Output directory where the event binary should be saved to

  - name: newEventBinary
    description: 'New event binary'
    method: POST
    path: event/events/{id}/binaries
    accept: 'application/json'
    alias:
        go: createBinary
        powershell: New-EventBinary
    pathParameters:
      - name: id
        type: string
        required: true
        description: Event id

    body:
      - name: file
        type: file
        required: true
        description: File to be uploaded as a binary

  - name: updateEventBinary
    description: 'Update event binary'
    method: PUT
    path: event/events/{id}/binaries
    accept: 'application/json'
    alias:
        go: updateBinary
        powershell: Update-EventBinary
    pathParameters:
      - name: id
        type: string
        required: true
        description: Event id

    body:
      - name: file
        type: file
        required: true
        description: File to be uploaded as a binary

  - name: deleteEventBinary
    description: 'Delete event binary'
    method: DELETE
    path: event/events/{id}/binaries
    accept: 'application/json'
    alias:
        go: deleteBinary
        powershell: Remove-EventBinary
    pathParameters:
      - name: id
        type: string
        required: true
        description: Event id