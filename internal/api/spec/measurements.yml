
---
information:
  name: measurements
  description: Cumulocity measurements
  descriptionLong: 'REST endpoint to interact with Cumulocity measurements'
  link: https://cumulocity.com/guides/reference/measurements/

endpoints:
  - name: getMeasurementCollection
    method: GET
    description: Get a collection of measurements based on filter parameters
    descriptionLong: Get a collection of measurements based on filter parameters
    examples:
      powershell:
        - Get a list of measurements
          Get-MeasurementCollection

      go:
        - Get a list of measurements
          c8y measurement list

    path: measurement/measurements
    accept: application/vnd.com.nsn.cumulocity.measurementCollection+json
    collectionType: application/vnd.com.nsn.cumulocity.measurement+json
    listProperty: measurements
    alias:
        go: list
        powershell: Get-MeasurementCollection
    headerParameters:
      - name: csv
        type: boolean
        description: Results will be displayed in csv format
        header: Accept
        value: text/csv

      - name: excel
        type: boolean
        description: Results will be displayed in Excel format
        header: Accept
        value: application/vnd.ms-excel

      - name: unit
        type: string
        description: Every measurement fragment which contains 'unit' property will be transformed to use required system of units.
        header: X-Cumulocity-System-Of-Units
        validateSet: [imperial, metric]

    queryParameters:
      - name: device
        type: '[]device'
        property: source
        description: Device ID

      - name: type
        type: string
        description: Measurement type.

      - name: valueFragmentType
        type: string
        description: value fragment type

      - name: valueFragmentSeries
        type: string
        description: value fragment series

      - name: fragmentType
        type: string
        deprecated: true
        description: Fragment name from measurement.

      - name: dateFrom
        type: datetime
        description: Start date or date and time of measurement occurrence.

      - name: dateTo
        type: datetime
        description: End date or date and time of measurement occurrence.

      - name: revert
        type: boolean
        description: Return the newest instead of the oldest measurements. Must be used with dateFrom and dateTo parameters

  - name: getMeasurementSeries
    method: GET
    description: Get a collection of measurements based on filter parameters
    descriptionLong: Get a collection of measurements based on filter parameters
    examples:
      powershell:
        - Get measurement series
          Get-MeasurementSeries

      go:
        - Get a list of measurement series
          c8y measurement getSeries

        - Get a list of series [nx_WEA_29_Delta.MDL10FG001] and [nx_WEA_29_Delta.ST9] for device 12345
          measurement getSeries --source 12345 --series nx_WEA_29_Delta.MDL10FG001 --series nx_WEA_29_Delta.ST9 --dateFrom (Get-C8yDate (last 10min)) --dateTo (Get-C8yDate (last 0min))

    path: measurement/measurements/series
    accept: 'application/json'
    alias:
        go: getSeries
        powershell: Get-MeasurementSeries
    queryParameters:
      - name: device
        type: '[]device'
        property: source
        description: Device ID

      - name: series
        type: "[]string"
        description: measurement type and series name, e.g. c8y_AccelerationMeasurement.acceleration

      - name: aggregationType
        type: string
        deprecated: true
        description: Fragment name from measurement.
        validateSet: [DAILY, HOURLY, MINUTELY]

      - name: dateFrom
        type: datetime
        required: true
        description: Start date or date and time of measurement occurrence.

      - name: dateTo
        type: datetime
        required: true
        description: End date or date and time of measurement occurrence.

  - name: getMeasurement
    description: 'Get measurement/s'
    method: GET
    path: measurement/measurements/{id}
    accept: application/vnd.com.nsn.cumulocity.measurement+json
    alias:
        go: get
        powershell: Get-Measurement
    pathParameters:
      - name: id
        type: string
        required: true
        description: Measurement id

  - name: newMeasurement
    method: POST
    path: measurement/measurements
    accept: application/vnd.com.nsn.cumulocity.measurement+json
    description: 'Create a new measurement'
    descriptionLong: 'Create a new measurement'
    alias:
        go: create
        powershell: New-Measurement
    body:
      - name: device
        type: '[]device'
        pipeline: true
        required: true
        property: source.id
        description: The ManagedObject which is the source of this measurement.

      - name: time
        type: datetime
        required: true
        description: Time of the measurement.

      - name: type
        type: string
        required: true
        description: The most specific type of this entire measurement.

      - name: data
        type: json
        description: List of measurement fragments.

  - name: deleteMeasurement
    description: 'Delete measurement/s'
    method: DELETE
    path: measurement/measurements/{id}
    accept: ''
    alias:
        go: delete
        powershell: Remove-Measurement
    pathParameters:
      - name: id
        type: string
        required: true
        description: Measurement id

  - name: deleteMeasurementCollection
    description: 'Delete a collection of measurements'
    method: DELETE
    path: measurement/measurements
    accept: ''
    alias:
        go: deleteCollection
        powershell: Remove-MeasurementCollection
    queryParameters:
      - name: device
        type: '[]device'
        property: source
        description: Device ID

      - name: type
        type: string
        description: Measurement type.

      - name: valueFragmentType
        type: string
        description: value fragment type

      - name: valueFragmentSeries
        type: string
        description: value fragment series

      - name: fragmentType
        type: string
        deprecated: true
        description: Fragment name from measurement.

      - name: dateFrom
        type: datetime
        description: Start date or date and time of measurement occurrence.

      - name: dateTo
        type: datetime
        description: End date or date and time of measurement occurrence.
