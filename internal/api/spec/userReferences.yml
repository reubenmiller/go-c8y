
---

information:
  name: userReferences
  description: Cumulocity user references
  descriptionLong: 'REST endpoint to interact with Cumulocity user references'
  link: https://cumulocity.com/guides/reference/users/#user-reference-collection

endpoints:
  - name: addUserToGroup
    description: Get user
    method: POST
    path: /user/{tenant}/groups/{groupId}/users
    accept: 'application/vnd.com.nsn.cumulocity.userReference+json'
    alias:
        go: addUserToGroup
        powershell: Add-UserToGroup
    pathParameters:
      - name: tenant
        type: tenant
        description: Tenant

      - name: groupId
        type: string
        description: Group ID

    body:
      # TODO: Handle value expansion using the valueFormatter
      - name: userId
        type: string
        property: user.self
        description: User id
        valueFormatter: "{url}/user/{tenant}/users/{userId}"


  - name: deleteUserFromGroup
    description: Delete a user from a group
    method: DELETE
    path: /user/{tenant}/groups/{groupId}/users/{userId}
    accept: 'application/vnd.com.nsn.cumulocity.currentUser+json'
    alias:
        go: deleteUserFromGroup
        powershell: Remove-UserFromGroup
    pathParameters:
      - name: tenant
        type: tenant
        description: Tenant

      - name: groupId
        type: string
        description: Group ID

      - name: userId
        type: string
        description: User id/username

  - name: getUsersInGroup
    description: Get all users in a group
    method: GET
    path: /user/{tenant}/groups/{groupId}
    accept: application/vnd.com.nsn.cumulocity.userReferenceCollection+json
    alias:
        go: getGroupMembership
        powershell: Get-GroupMembership
    pathParameters:
      - name: tenant
        type: tenant
        description: Tenant

      - name: groupId
        type: string
        description: Group ID
