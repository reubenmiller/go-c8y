
---

information:
  name: userRoles
  description: Cumulocity user roles
  descriptionLong: 'REST endpoint to interact with Cumulocity user roles'
  link: https://cumulocity.com/guides/reference/users/#group-reference-collection

endpoints:
  - name: getRoleCollection
    description: Get collection of user roles
    method: GET
    path: /user/roles
    accept: application/vnd.com.nsn.cumulocity.roleCollection+json
    collectionType: application/vnd.com.nsn.cumulocity.role+json
    listProperty: roles
    alias:
        go: list
        powershell: Get-RoleCollection
    examples:
      powershell:
        - description: Get a list of roles
          command: Get-RoleCollection -PageSize 100
      go:
        - description: Get a list of roles
          command: c8y userRoles list --pageSize 100

  - name: addRoleToUser
    description: Add role to a user
    method: POST
    path: /user/{tenant}/users/{username}/roles
    accept: application/vnd.com.nsn.cumulocity.roleReference+json
    alias:
        go: addRoleTouser
        powershell: Add-RoleToUser
    examples:
      powershell:
        - description: Get a role (ROLE_ALARM_READ) to a user
          beforeEach:
            - $User = PSC8y\New-TestUser
          command: Add-RoleToUser -Username $User.id -Role "ROLE_ALARM_READ"
          afterEach:
            - PSC8y\Remove-User -Id $User.id
      go:
        - description: Get a role (ROLE_ALARM_READ) to a user
          command: c8y userRoles addRoleTouser --username "myuser" --role "ROLE_ALARM_READ"
    pathParameters:
      - name: tenant
        type: tenant
        description: Tenant

      - name: username
        type: string
        required: true
        description: Username

    body:
      # TODO: Add role self link lookup
      - name: role
        type: string
        property: role.self
        description: User role id
        valueFormatter: "{url}/user/roles/{role}"

  - name: deleteRoleFromUser
    description: Unassign/Remove role from a user
    method: DELETE
    path: /user/{tenant}/users/{username}/roles/{role}
    alias:
        go: deleteRoleFromUser
        powershell: Remove-RoleFromUser
    pathParameters:
      - name: tenant
        type: tenant
        description: Tenant

      - name: username
        type: string
        required: true
        description: Username

      - name: role
        type: string
        required: true
        description: Role name

  - name: addRoleToGroup
    description: Add role to a group
    method: POST
    path: /user/{tenant}/groups/{groupId}/roles
    accept: application/vnd.com.nsn.cumulocity.roleReference+json
    alias:
        go: addRoleToGroup
        powershell: Add-RoleToGroup
    pathParameters:
      - name: tenant
        type: tenant
        description: Tenant

      - name: groupId
        type: string
        required: true
        description: Group ID

    body:
      # TODO: Add role self link lookup from an id
      - name: role
        type: string
        required: true
        property: role.self
        description: User role id
        valueFormatter: "{url}/user/roles/{role}"

  - name: deleteRoleFromGroup
    description: Unassign/Remove role from a group
    method: DELETE
    path: /user/{tenant}/groups/{groupId}/roles/{role}
    alias:
        go: deleteRoleFromGroup
        powershell: Remove-RoleFromGroup
    pathParameters:
      - name: tenant
        type: tenant
        description: Tenant

      - name: groupId
        type: string
        required: true
        description: Group id

      - name: role
        type: string
        required: true
        description: Role name, e.g. ROLE_TENANT_MANAGEMENT_ADMIN


  - name: getRoleReferenceCollectionFromUser
    description: Get collection of user role references from a user
    method: GET
    path: /user/{tenant}/users/{username}/roles
    accept: application/vnd.com.nsn.cumulocity.roleReferenceCollection+json
    collectionType: application/vnd.com.nsn.cumulocity.roleReference+json
    listProperty: references
    alias:
        go: getRoleReferenceCollectionFromUser
        powershell: Get-RoleReferenceCollectionFromUser
    examples:
      powershell:
        - description: Get a list of role references for a user
          beforeEach:
            - $User = Get-CurrentUser
          command: Get-RoleReferenceCollectionFromUser -Username $User.id
      go:
        - description: Get a list of role references for a user
          command: c8y userRoles getRoleReferenceCollectionFromUser --username "myuser"
    pathParameters:
      - name: tenant
        type: tenant
        description: Tenant

      - name: username
        type: string
        required: true
        description: Username

  - name: getRoleReferenceCollectionFromGroup
    description: Get collection of user role references from a group
    method: GET
    path: /user/{tenant}/groups/{groupId}/roles
    accept: application/vnd.com.nsn.cumulocity.roleReferenceCollection+json
    collectionType: application/vnd.com.nsn.cumulocity.roleReference+json
    listProperty: references
    alias:
        go: getRoleReferenceCollectionFromGroup
        powershell: Get-RoleReferenceCollectionFromGroup
    examples:
      powershell:
        - description: Get a list of role references for a user group
          beforeEach:
            - $Group = Get-GroupByName -Name "business"
          command: Get-RoleReferenceCollectionFromGroup -GroupId $Group.id
      go:
        - description: Get a list of role references for a user group
          command: c8y userRoles getRoleReferenceCollectionFromGroup --groupId "12345"
    pathParameters:
      - name: tenant
        type: tenant
        description: Tenant

      - name: groupId
        type: string
        required: true
        description: Group id
