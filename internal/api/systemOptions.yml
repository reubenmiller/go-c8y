
---

#
# system options
# https://cumulocity.com/guides/reference/tenants/#system-options
#
- name: getSystemOptionCollection
  description: 'Get collection of system options'
  descriptionLong: 'This endpoint provides a set of read-only properties pre-defined in platform configuration. The response format is exactly the same as for OptionCollection.'
  method: GET
  path: /tenant/system/options
  accept: application/vnd.com.nsn.cumulocity.optionCollection+json
  alias:
      go: list
      powershell: Get-SystemOptionCollection

- name: getSystemOption
  description: 'Get system option'
  method: GET
  path: /tenant/system/options/{category}/{key}
  accept: application/vnd.com.nsn.cumulocity.option+json
  alias:
      go: get
      powershell: Get-SystemOption
  pathParameters:
    - name: category
      type: string
      required: true
      description: System Option category

    - name: key
      type: string
      required: true
      description: System Option key

