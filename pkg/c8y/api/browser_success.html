<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Authenticated - Cumulocity IoT</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0d1117;
    color: #e8f0fe;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* Subtle animated star-field background */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(1px 1px at  10%  20%, rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at  30%  65%, rgba(255,255,255,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at  55%  10%, rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at  75%  45%, rgba(255,255,255,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at  88%  80%, rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at  20%  88%, rgba(255,255,255,.3) 0%, transparent 100%),
      radial-gradient(1px 1px at  65%  72%, rgba(255,255,255,.3) 0%, transparent 100%);
    animation: twinkle 6s ease-in-out infinite alternate;
    pointer-events: none;
  }
  @keyframes twinkle {
    from { opacity: .6; }
    to   { opacity: 1; }
  }

  .card {
    position: relative;
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 20px;
    padding: 56px 64px 48px;
    max-width: 480px;
    width: 90%;
    text-align: center;
    backdrop-filter: blur(16px);
    animation: rise .6s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Official wordmark - fill overridden to white for dark background */
  .logo-wrap {
    margin-bottom: 36px;
    animation: fade-in .8s .1s both;
  }
  @keyframes fade-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .logo-wrap svg { width: 220px; height: auto; fill: #ffffff; }

  /* Animated check ring */
  .check-ring {
    width: 80px;
    height: 80px;
    margin: 0 auto 28px;
  }
  .check-ring circle {
    fill: none;
    stroke: #ffd200;
    stroke-width: 4;
    stroke-dasharray: 220;
    stroke-dashoffset: 220;
    stroke-linecap: round;
    animation: draw-ring .7s .3s cubic-bezier(.65,0,.35,1) forwards;
    transform-origin: center;
    transform: rotate(-90deg);
  }
  .check-ring polyline {
    fill: none;
    stroke: #ffd200;
    stroke-width: 5;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 60;
    stroke-dashoffset: 60;
    animation: draw-check .4s .95s ease forwards;
  }
  @keyframes draw-ring {
    to { stroke-dashoffset: 0; }
  }
  @keyframes draw-check {
    to { stroke-dashoffset: 0; }
  }

  h1 {
    font-size: 1.5rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 10px;
    animation: fade-in .5s .8s both;
  }
  p {
    font-size: .95rem;
    color: rgba(255,255,255,.55);
    line-height: 1.6;
    animation: fade-in .5s 1s both;
  }
  .pill {
    display: inline-block;
    margin-top: 28px;
    background: rgba(255,210,0,.1);
    border: 1px solid rgba(255,210,0,.35);
    color: #ffd200;
    font-size: .8rem;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 6px 18px;
    border-radius: 99px;
    animation: fade-in .5s 1.2s both;
  }
  .details {
    margin-top: 24px;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 12px;
    padding: 14px 18px;
    text-align: left;
    animation: fade-in .5s 1.1s both;
  }
  .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 16px;
    font-size: .82rem;
  }
  .detail-row + .detail-row {
    border-top: 1px solid rgba(255,255,255,.06);
    margin-top: 8px;
    padding-top: 8px;
  }
  .detail-label {
    color: rgba(255,255,255,.4);
    font-weight: 500;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .detail-value {
    color: rgba(255,255,255,.75);
    font-family: ui-monospace, "Cascadia Code", monospace;
    font-size: .78rem;
    word-break: break-all;
    text-align: right;
  }

</style>
</head>

  <!-- Animated success ring + check -->
  <svg class="check-ring" viewBox="0 0 80 80">
    <circle cx="40" cy="40" r="34"/>
    <polyline points="24,40 34,51 56,28"/>
  </svg>

  <h1>Authentication successful</h1>
  <p>You are now signed in via SSO.<br>You may close this tab and return to your terminal.</p>
  {{if .TenantURL}}
  <div class="details">
    <div class="detail-row">
      <span class="detail-label">URL</span>
      <span class="detail-value">{{.TenantURL}}</span>
    </div>
